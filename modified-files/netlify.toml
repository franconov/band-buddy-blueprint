[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback: tutte le route non-asset vanno all'index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Redirect www -> non-www (scegli una variante canonica)
# NOTA: se preferisci www -> non-www o viceversa, commenta uno dei due blocchi
[[redirects]]
  from = "https://ildubbiodidavide.it/*"
  to = "https://www.ildubbiodidavide.it/:splat"
  status = 301
  force = true

# Security headers globali
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# Cache aggressivo per asset con hash Vite
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache più leggero per immagini statiche
[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
